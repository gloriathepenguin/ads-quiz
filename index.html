<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>广告投放知识测验</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600;9..144,700;9..144,900&family=Noto+Serif+SC:wght@300;400;500;600;700;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
/* ════════════════════════════════════════
   样式 · 编辑杂志风
   ════════════════════════════════════════ */
:root {
  --paper: #f4f1ea;
  --paper-dark: #ebe6da;
  --ink: #1a1814;
  --ink-soft: #4a4640;
  --ink-muted: #8a847a;
  --accent: #c8412a;
  --accent-soft: #e8b9af;
  --success: #4a6b3e;
  --success-soft: #c8d4bf;
  --error: #a8321e;
  --error-soft: #f0d4cc;
  --warning: #b8862a;
  --rule: #1a1814;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  background: var(--paper);
  color: var(--ink);
  font-family: 'Noto Serif SC', 'Fraunces', Georgia, serif;
  font-weight: 400;
  line-height: 1.6;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}
body::before {
  content: '';
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 1;
  opacity: 0.4;
  background-image:
    radial-gradient(circle at 20% 30%, rgba(0,0,0,0.015) 0%, transparent 50%),
    radial-gradient(circle at 80% 70%, rgba(0,0,0,0.02) 0%, transparent 50%),
    repeating-linear-gradient(45deg, transparent, transparent 2px, rgba(0,0,0,0.005) 2px, rgba(0,0,0,0.005) 4px);
}
a { color: inherit; text-decoration: none; cursor: pointer; }
.container {
  max-width: 880px;
  margin: 0 auto;
  padding: 48px 32px 100px;
  position: relative;
  z-index: 2;
}

/* Masthead */
.masthead {
  border-top: 6px double var(--rule);
  border-bottom: 1px solid var(--rule);
  padding: 20px 0 16px;
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  flex-wrap: wrap;
  gap: 12px;
}
.masthead-left, .masthead-right {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--ink-soft);
}
.masthead-right a { transition: color 0.2s; }
.masthead-right a:hover { color: var(--accent); }
.masthead-right .divider { margin: 0 8px; color: var(--ink-muted); }

/* Title Block */
.title-block {
  padding: 36px 0 28px;
  border-bottom: 1px solid var(--rule);
  margin-bottom: 36px;
}
.kicker {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 14px;
  font-weight: 500;
}
h1 {
  font-family: 'Fraunces', 'Noto Serif SC', serif;
  font-weight: 900;
  font-size: clamp(44px, 7vw, 84px);
  line-height: 0.92;
  letter-spacing: -0.03em;
  color: var(--ink);
  margin-bottom: 20px;
  font-variation-settings: 'opsz' 144;
}
h1 em {
  font-style: italic;
  font-weight: 300;
  color: var(--accent);
}
.dek {
  font-size: 16px;
  line-height: 1.55;
  color: var(--ink-soft);
  max-width: 600px;
}
.meta-row {
  display: flex;
  gap: 24px;
  margin-top: 24px;
  flex-wrap: wrap;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--ink-muted);
}
.meta-row strong { color: var(--ink); font-weight: 500; }

/* Section Header */
.section-header {
  display: flex;
  align-items: baseline;
  gap: 16px;
  margin: 56px 0 28px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--rule);
}
.section-num {
  font-family: 'Fraunces', serif;
  font-size: 48px;
  font-weight: 300;
  font-style: italic;
  color: var(--accent);
  line-height: 1;
  letter-spacing: -0.04em;
}
.section-title {
  font-family: 'Fraunces', 'Noto Serif SC', serif;
  font-size: 22px;
  font-weight: 600;
  letter-spacing: -0.01em;
  flex: 1;
}
.section-meta {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--ink-muted);
}

/* Colophon */
.colophon {
  margin-top: 56px;
  padding-top: 20px;
  border-top: 1px solid rgba(26,24,20,0.2);
  text-align: center;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--ink-muted);
}

/* Buttons */
.btn {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  font-weight: 500;
  padding: 14px 24px;
  cursor: pointer;
  transition: all 0.2s;
  border: none;
  display: inline-flex;
  align-items: center;
  gap: 8px;
}
.btn-primary { background: var(--ink); color: var(--paper); }
.btn-primary:hover { background: var(--accent); }
.btn-ghost { background: transparent; color: var(--ink); border: 1px solid var(--ink); }
.btn-ghost:hover { background: var(--ink); color: var(--paper); }

/* Module Cards */
.module-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  margin-bottom: 40px;
}
.module-card {
  padding: 28px 28px 24px;
  background: rgba(255,255,255,0.5);
  border: 1px solid rgba(26,24,20,0.15);
  cursor: pointer;
  transition: all 0.25s;
  display: flex;
  flex-direction: column;
  text-align: left;
  font-family: inherit;
  color: inherit;
  position: relative;
  overflow: hidden;
}
.module-card::after {
  content: '→';
  position: absolute;
  top: 24px;
  right: 24px;
  font-family: 'Fraunces', serif;
  font-size: 22px;
  color: var(--ink-muted);
  transition: all 0.25s;
}
.module-card:hover {
  background: #fff;
  border-color: var(--ink);
  transform: translateY(-2px);
}
.module-card:hover::after {
  color: var(--accent);
  transform: translateX(4px);
}
.module-icon {
  font-family: 'Fraunces', serif;
  font-size: 38px;
  font-weight: 300;
  color: var(--accent);
  line-height: 1;
  margin-bottom: 14px;
  font-style: italic;
}
.module-title {
  font-family: 'Fraunces', 'Noto Serif SC', serif;
  font-size: 22px;
  font-weight: 600;
  letter-spacing: -0.01em;
  margin-bottom: 8px;
  line-height: 1.2;
}
.module-subtitle {
  font-size: 14px;
  line-height: 1.55;
  color: var(--ink-soft);
  margin-bottom: 16px;
  flex: 1;
}
.module-footer {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  padding-top: 14px;
  border-top: 1px solid rgba(26,24,20,0.1);
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--ink-muted);
}
.module-footer strong { color: var(--ink); font-weight: 500; }
.module-card.all-in-one {
  grid-column: 1 / -1;
  background: var(--ink);
  color: var(--paper);
  border-color: var(--ink);
}
.module-card.all-in-one::after { color: var(--accent-soft); }
.module-card.all-in-one .module-icon { color: var(--accent-soft); }
.module-card.all-in-one .module-subtitle { color: rgba(244,241,234,0.75); }
.module-card.all-in-one .module-footer {
  border-top-color: rgba(244,241,234,0.2);
  color: rgba(244,241,234,0.5);
}
.module-card.all-in-one .module-footer strong { color: var(--paper); }
.module-card.all-in-one:hover { background: var(--ink); transform: translateY(-2px); }
.module-card.mistakes {
  background: var(--paper-dark);
  border-color: rgba(168,50,30,0.3);
}
.module-card.mistakes .module-icon { color: var(--error); }
.module-card.mistakes.empty { opacity: 0.55; cursor: default; }
.module-card.mistakes.empty:hover {
  background: var(--paper-dark);
  transform: none;
  border-color: rgba(168,50,30,0.3);
}
.module-card.mistakes.empty::after { display: none; }

/* Score Panel */
.score-panel {
  margin-bottom: 36px;
  padding: 20px 24px;
  background: var(--paper-dark);
  border-left: 3px solid var(--accent);
  display: grid;
  grid-template-columns: 1fr 1fr 1fr 1fr;
  gap: 20px;
  align-items: end;
}
.score-progress { grid-column: 1 / -1; margin-top: 12px; }
.score-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--ink-muted);
  margin-bottom: 4px;
}
.score-value {
  font-family: 'Fraunces', serif;
  font-size: 28px;
  font-weight: 600;
  line-height: 1;
  letter-spacing: -0.02em;
}
.score-value.correct { color: var(--success); }
.score-value.wrong { color: var(--error); }
.score-value em {
  font-style: italic;
  font-weight: 300;
  font-size: 16px;
  color: var(--ink-muted);
}
.progress-bar {
  height: 4px;
  background: rgba(26,24,20,0.1);
  position: relative;
  overflow: hidden;
}
.progress-fill {
  position: absolute;
  inset: 0 100% 0 0;
  background: var(--accent);
  transition: right 0.5s cubic-bezier(0.65, 0, 0.35, 1);
}
.progress-label-row {
  display: flex;
  justify-content: space-between;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--ink-muted);
  margin-bottom: 6px;
}

/* Question */
.question {
  margin-bottom: 28px;
  padding: 26px 30px;
  background: rgba(255,255,255,0.4);
  border: 1px solid rgba(26,24,20,0.12);
  transition: background 0.3s ease;
}
.question.answered { background: rgba(255,255,255,0.65); }
.q-header {
  display: flex;
  align-items: baseline;
  gap: 14px;
  margin-bottom: 18px;
}
.q-num {
  font-family: 'Fraunces', serif;
  font-style: italic;
  font-size: 14px;
  color: var(--accent);
  font-weight: 500;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  flex-shrink: 0;
  padding-top: 4px;
}
.q-text {
  font-family: 'Noto Serif SC', serif;
  font-size: 16.5px;
  line-height: 1.55;
  color: var(--ink);
  font-weight: 500;
}
.options {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.option {
  display: flex;
  align-items: flex-start;
  gap: 14px;
  padding: 13px 16px;
  background: var(--paper);
  border: 1px solid rgba(26,24,20,0.15);
  cursor: pointer;
  transition: all 0.18s;
  font-size: 14.5px;
  line-height: 1.5;
  color: var(--ink-soft);
  text-align: left;
  font-family: inherit;
  width: 100%;
}
.option:hover:not(:disabled) {
  background: #fff;
  border-color: var(--ink-soft);
  color: var(--ink);
}
.option:disabled { cursor: not-allowed; }
.opt-letter {
  font-family: 'Fraunces', serif;
  font-style: italic;
  font-weight: 500;
  color: var(--accent);
  flex-shrink: 0;
  width: 20px;
  font-size: 16px;
}
.opt-text { flex: 1; }
.option.correct {
  background: var(--success-soft);
  border-color: var(--success);
  color: var(--ink);
}
.option.correct .opt-letter { color: var(--success); }
.option.wrong {
  background: var(--error-soft);
  border-color: var(--error);
  color: var(--ink);
}
.option.wrong .opt-letter { color: var(--error); }
.option.faded { opacity: 0.45; }

/* Explanation */
.explanation {
  margin-top: 16px;
  padding: 18px 20px;
  background: var(--paper-dark);
  border-left: 3px solid var(--success);
  display: none;
  animation: revealIn 0.4s cubic-bezier(0.65, 0, 0.35, 1);
}
.explanation.show { display: block; }
.explanation.wrong-style { border-left-color: var(--error); }
@keyframes revealIn {
  from { opacity: 0; transform: translateY(-6px); }
  to { opacity: 1; transform: translateY(0); }
}
.exp-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--success);
  font-weight: 500;
  margin-bottom: 8px;
}
.explanation.wrong-style .exp-label { color: var(--error); }
.exp-content {
  font-size: 14px;
  line-height: 1.65;
  color: var(--ink-soft);
}
.exp-content strong { color: var(--ink); font-weight: 600; }
.exp-content em { font-style: italic; color: var(--accent); }

/* Final Card */
.final-card {
  margin-top: 56px;
  padding: 40px 36px;
  background: var(--ink);
  color: var(--paper);
  position: relative;
  display: none;
}
.final-card.show { display: block; }
.final-card::before {
  content: '※';
  position: absolute;
  top: 16px;
  right: 24px;
  font-size: 24px;
  color: var(--accent);
}
.final-kicker {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--accent-soft);
  margin-bottom: 14px;
}
.final-title {
  font-family: 'Fraunces', 'Noto Serif SC', serif;
  font-size: 30px;
  font-weight: 700;
  line-height: 1.1;
  margin-bottom: 16px;
  letter-spacing: -0.02em;
}
.final-title em {
  font-style: italic;
  font-weight: 300;
  color: var(--accent-soft);
}
.final-score {
  font-family: 'Fraunces', serif;
  font-size: 72px;
  font-weight: 300;
  line-height: 1;
  letter-spacing: -0.04em;
  margin: 24px 0 8px;
}
.final-score em {
  font-style: italic;
  color: var(--accent-soft);
  font-size: 36px;
  font-weight: 300;
}
.final-grade {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--accent-soft);
  margin-bottom: 20px;
}
.final-text {
  font-size: 15px;
  line-height: 1.65;
  color: rgba(244,241,234,0.85);
  margin-bottom: 24px;
}
.final-actions { display: flex; gap: 12px; flex-wrap: wrap; }
.final-actions .btn-primary { background: var(--accent-soft); color: var(--ink); }
.final-actions .btn-primary:hover { background: var(--paper); }
.final-actions .btn-ghost { color: var(--accent-soft); border-color: var(--accent-soft); }
.final-actions .btn-ghost:hover { background: var(--accent-soft); color: var(--ink); }

/* Empty State */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--ink-muted);
}
.empty-state .icon {
  font-family: 'Fraunces', serif;
  font-size: 64px;
  font-style: italic;
  color: var(--accent-soft);
  margin-bottom: 16px;
}
.empty-state .title {
  font-family: 'Fraunces', 'Noto Serif SC', serif;
  font-size: 22px;
  font-weight: 600;
  color: var(--ink);
  margin-bottom: 8px;
}
.empty-state .text {
  font-size: 15px;
  line-height: 1.6;
  max-width: 440px;
  margin: 0 auto 24px;
}

/* Mistakes 页专用 */
.mistakes-toolbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 16px;
  margin-bottom: 32px;
  padding: 18px 22px;
  background: var(--paper-dark);
  border-left: 3px solid var(--error);
  flex-wrap: wrap;
}
.mistakes-toolbar-info {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--ink-soft);
}
.mistakes-toolbar-info strong {
  color: var(--error);
  font-size: 14px;
  font-weight: 600;
}
.mistakes-toolbar-actions {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}
.toolbar-btn {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  padding: 10px 16px;
  cursor: pointer;
  border: 1px solid var(--ink);
  background: transparent;
  color: var(--ink);
  transition: all 0.2s;
}
.toolbar-btn:hover { background: var(--ink); color: var(--paper); }
.toolbar-btn.primary { background: var(--ink); color: var(--paper); }
.toolbar-btn.primary:hover { background: var(--accent); border-color: var(--accent); }
.toolbar-btn.danger { border-color: var(--error); color: var(--error); }
.toolbar-btn.danger:hover { background: var(--error); color: var(--paper); }
.mistake-preview {
  margin-bottom: 16px;
  padding: 20px 24px;
  background: rgba(255,255,255,0.5);
  border: 1px solid rgba(168,50,30,0.25);
  border-left: 3px solid var(--error);
  transition: all 0.2s;
}
.mistake-preview:hover { background: #fff; }
.mistake-header {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  gap: 12px;
  margin-bottom: 10px;
  flex-wrap: wrap;
}
.mistake-tag {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--ink-muted);
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
}
.mistake-tag .module-tag { color: var(--accent); font-weight: 500; }
.mistake-remove {
  background: transparent;
  border: none;
  color: var(--ink-muted);
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  cursor: pointer;
  padding: 4px 8px;
  transition: all 0.2s;
}
.mistake-remove:hover { color: var(--error); }
.mistake-q {
  font-family: 'Noto Serif SC', serif;
  font-size: 15.5px;
  line-height: 1.55;
  color: var(--ink);
  font-weight: 500;
}

/* Mobile */
@media (max-width: 640px) {
  .container { padding: 28px 18px 80px; }
  .question { padding: 20px 18px; }
  .option { padding: 11px 13px; font-size: 14px; gap: 10px; }
  .opt-letter { width: 18px; font-size: 15px; }
  .meta-row { gap: 14px; font-size: 10px; }
  .score-panel { grid-template-columns: 1fr 1fr; gap: 14px; padding: 16px 18px; }
  .score-value { font-size: 24px; }
  .final-score { font-size: 56px; }
  .section-num { font-size: 38px; }
  .section-title { font-size: 18px; }
  .q-text { font-size: 15.5px; }
  .module-grid { grid-template-columns: 1fr; gap: 14px; }
  .module-card { padding: 22px 22px 20px; }
  .module-card::after { top: 20px; right: 20px; font-size: 20px; }
  .module-title { font-size: 19px; }
  .final-actions { flex-direction: column; }
  .final-actions .btn { width: 100%; justify-content: center; }
}
</style>
</head>
<body>

<div id="app"></div>

<script>
/* ════════════════════════════════════════
   题库 · 未来扩充就改这里
   ════════════════════════════════════════
   题目结构：
     id        — 全局唯一 ID（错题本去重的依据）
     q         — 题干
     options   — 选项数组，每项 { text, correct? }
                 每题应该有且仅有一个 correct: true
     explain   — 解析（支持 <strong> <em> <br>）
     tags      — 标签数组（可选）
   ──────────────────────────────────────── */

const MODULES = [
  {
    id: 'overview',
    title: '广告类型大局观',
    subtitle: '建立 Google Ads 与 Meta 广告的整体认知，理解两大平台的定位、广告类型和适用场景',
    icon: '◐',
    sections: [
      {
        title: 'Google Ads 大局观',
        questions: [
          {
            id: 'overview-001',
            q: 'Google Ads 的所有广告类型，可以从用户意图角度划分为两大阵营。下面哪个组合是"主动需求型"（用户主动搜索，你被搜到）？',
            options: [
              { text: '搜索广告 + 购物广告', correct: true },
              { text: '展示广告 + YouTube 广告' },
              { text: 'Demand Gen + 应用广告' },

/* ════════════════════════════════════════
   工具函数
   ════════════════════════════════════════ */
function getCorrectIndex(question) {
  return question.options.findIndex(opt => opt.correct === true);
}
function getQuestionsByModule(moduleId) {
  const module = MODULES.find(m => m.id === moduleId);
  if (!module) return [];
  const result = [];
  module.sections.forEach(s => s.questions.forEach(q => {
    result.push({ ...q, section: s.title, module: module.title, moduleId: module.id });
  }));
  return result;
}
function getAllQuestions() {
  const result = [];
  MODULES.forEach(m => m.sections.forEach(s => s.questions.forEach(q => {
    result.push({ ...q, section: s.title, module: m.title, moduleId: m.id });
  })));
  return result;
}
function getQuestionsByIds(ids) {
  const all = getAllQuestions();
  return ids.map(id => all.find(q => q.id === id)).filter(Boolean);
}
function getModuleStats() {
  return MODULES.map(m => {
    let count = 0;
    m.sections.forEach(s => count += s.questions.length);
    return { id: m.id, title: m.title, subtitle: m.subtitle, icon: m.icon, count };
  });
}

/* ════════════════════════════════════════
   错题本存储
   ════════════════════════════════════════ */
const MISTAKES_KEY = 'ads-quiz:mistakes';
function getMistakes() {
  try { return JSON.parse(localStorage.getItem(MISTAKES_KEY) || '[]'); }
  catch { return []; }
}
function saveMistake(id) {
  const set = new Set(getMistakes());
  set.add(id);
  localStorage.setItem(MISTAKES_KEY, JSON.stringify([...set]));
}
function removeMistake(id) {
  const ids = getMistakes().filter(x => x !== id);
  localStorage.setItem(MISTAKES_KEY, JSON.stringify(ids));
}
function clearMistakes() {
  localStorage.removeItem(MISTAKES_KEY);
}

/* ════════════════════════════════════════
   Hash 路由
   #/                    → home (onboarding)
   #/quiz?module=google  → 单模块练习
   #/quiz?module=all     → 综合测试
   #/quiz?mode=mistakes  → 错题本练习
   #/mistakes            → 错题本预览页
   ════════════════════════════════════════ */
function parseHash() {
  const hash = window.location.hash.slice(1) || '/';
  const [path, queryStr] = hash.split('?');
  const params = new URLSearchParams(queryStr || '');
  return { path: path || '/', params };
}

function navigate(hash) {
  window.location.hash = hash;
}

window.addEventListener('hashchange', render);
window.addEventListener('DOMContentLoaded', render);

function render() {
  const { path, params } = parseHash();
  const app = document.getElementById('app');
  window.scrollTo({ top: 0, behavior: 'instant' });

  if (path === '/' || path === '') {
    renderHome(app);
  } else if (path === '/quiz') {
    renderQuiz(app, params);
  } else if (path === '/mistakes') {
    renderMistakes(app);
  } else {
    app.innerHTML = `<div class="container"><div class="empty-state"><div class="icon">∅</div><div class="title">页面不存在</div><a class="btn btn-primary" href="#/">回到首页</a></div></div>`;
  }
}

          <div class="module-subtitle">所有模块的题目混合在一起，模拟真实考试场景，全面检验你的掌握程度。</div>
          <div class="module-footer">
            <span>全模块混合</span>
            <strong>${all.length} 题</strong>
          </div>
        </a>

        ${stats.map(m => `
          <a class="module-card" href="#/quiz?module=${encodeURIComponent(m.id)}">
            <div class="module-icon">${m.icon}</div>
            <div class="module-title">${m.title}</div>
            <div class="module-subtitle">${m.subtitle}</div>
            <div class="module-footer">
              <span>单模块练习</span>
              <strong>${m.count} 题</strong>
            </div>
          </a>
        `).join('')}
      </div>

      <div class="colophon">
        ✦ 制作：Claude × 你 ✦ 持续学习，持续投放，持续翻车，持续优化 ✦
      </div>
    </div>
  `;

  document.getElementById('reset-data').addEventListener('click', () => {
    if (confirm('确定要清空所有错题记录吗？此操作不可恢复。')) {
      clearMistakes();
      render();
    }
  });
}

/* ════════════════════════════════════════
   页面：Quiz / 答题
   ════════════════════════════════════════ */
function renderQuiz(app, params) {
  const moduleId = params.get('module') || 'all';
  const isMistakesMode = params.get('mode') === 'mistakes';

  let questions = [];
  let pageTitle = '', pageSubtitle = '', pageDek = '', moduleLabel = '';

  if (isMistakesMode) {
    questions = getQuestionsByIds(getMistakes());
    pageTitle = '错题';
    pageSubtitle = '巩固复习';
    pageDek = '把答错过的题再做一遍。这次答对就会从错题本里移除，答错则继续保留。';
    moduleLabel = '错题本';
  } else if (moduleId === 'all') {
    questions = getAllQuestions();
    pageTitle = '综合';
    pageSubtitle = '全面测试';
    pageDek = '所有模块的题目混合在一起。点击选项即可作答，答错的题会自动收录进错题本。';
    moduleLabel = '综合测试';
  } else {
    const module = MODULES.find(m => m.id === moduleId);
    if (module) {
      questions = getQuestionsByModule(moduleId);
      const parts = module.title.split(' ');
      pageTitle = parts[0];
      pageSubtitle = parts.slice(1).join(' ') || '专项练习';
      pageDek = module.subtitle;
      moduleLabel = module.title;
    }
  }

  if (questions.length === 0) {
    app.innerHTML = `
      <div class="container">
        <div class="masthead">
          <div class="masthead-left">Vol. 04</div>
          <div class="masthead-right"><a href="#/">← 返回选择模块</a></div>
        </div>
        <div class="empty-state" style="margin-top: 80px;">
          <div class="icon">∅</div>
          <div class="title">${isMistakesMode ? '错题本是空的' : '没找到这个模块的题目'}</div>
          <div class="text">${
            isMistakesMode
              ? '先去做几轮测试吧，答错的题会自动出现在这里。'
              : '可能是链接参数错了，回到首页重新选一个模块。'
          }</div>
          <a class="btn btn-primary" href="#/">回到首页</a>
        </div>
      </div>
    `;
    return;
  }

  document.title = `${moduleLabel} · 广告投放知识测验`;

  app.innerHTML = `
    <div class="container">
      <div class="masthead">
        <div class="masthead-left">Vol. 04 · 答题中</div>
        <div class="masthead-right">
          <a href="#/">← 返回选择模块</a>
          <span class="divider">·</span>
          <a href="#/mistakes">错题本</a>
        </div>
      </div>

      <div class="title-block">
        <div class="kicker">— ${moduleLabel} —</div>
        <h1>${pageTitle}<br><em>${pageSubtitle}</em></h1>
        <p class="dek">${pageDek}</p>
        <div class="meta-row">
          <span><strong>${moduleLabel}</strong></span>
          <span><strong>${questions.length}</strong> 题</span>
          <span>预计 <strong>${Math.max(2, Math.ceil(questions.length * 0.4))}</strong> 分钟</span>
        </div>
      </div>

      <div class="score-panel">
        <div>
          <div class="score-label">已作答</div>
          <div class="score-value"><span id="answered">0</span><em>/${questions.length}</em></div>
        </div>
        <div>
          <div class="score-label">答对</div>
          <div class="score-value correct"><span id="correct">0</span></div>
        </div>
        <div>
          <div class="score-label">答错</div>
          <div class="score-value wrong"><span id="wrong">0</span></div>
        </div>
        <div>
          <div class="score-label">正确率</div>
          <div class="score-value"><span id="accuracy">—</span></div>
        </div>
        <div class="score-progress">
          <div class="progress-label-row">
            <span>当前进度</span>
            <span><span id="pct">0</span>%</span>
          </div>
          <div class="progress-bar">
            <div class="progress-fill" id="progress-fill"></div>
          </div>
        </div>
      </div>

      <div id="quiz-root"></div>

      <div class="final-card" id="final-card">
        <div class="final-kicker">— Final Score —</div>
        <div class="final-title">练习完成，<em>你的成绩</em></div>
        <div class="final-score"><span id="final-correct">0</span><em>/${questions.length}</em></div>
        <div class="final-grade" id="final-grade">—</div>
        <div class="final-text" id="final-text"></div>
        <div class="final-actions">
          <button class="btn btn-primary" id="retry-btn">↻ 再做一次</button>
          <a class="btn btn-ghost" href="#/mistakes" id="mistakes-link">查看错题本</a>
          <a class="btn btn-ghost" href="#/">换个模块</a>
        </div>
      </div>

      <div class="colophon">✦ 制作：Claude × 你 ✦</div>
    </div>
  `;

  renderQuestions(questions, moduleId, isMistakesMode);
}

function renderQuestions(questions, moduleId, isMistakesMode) {
  const root = document.getElementById('quiz-root');
  const groups = [];
  const seen = new Map();
  questions.forEach(q => {
    const key = (isMistakesMode || moduleId === 'all') ? (q.module || '题目') : (q.section || '题目');
    if (!seen.has(key)) {
      const g = { title: key, questions: [] };
      seen.set(key, g);
      groups.push(g);
    }
    seen.get(key).questions.push(q);
  });

  const romans = ['I.', 'II.', 'III.', 'IV.', 'V.', 'VI.', 'VII.', 'VIII.', 'IX.', 'X.'];
  let qIndex = 0;
  let html = '';

  groups.forEach((g, gIdx) => {
    if (groups.length > 1) {
      const start = qIndex + 1;
      const end = qIndex + g.questions.length;
      html += `
        <div class="section-header">
          <div class="section-num">${romans[gIdx] || (gIdx+1)+'.'}</div>
          <div class="section-title">${g.title}</div>
          <div class="section-meta">Q${String(start).padStart(2,'0')} — Q${String(end).padStart(2,'0')}</div>
        </div>
      `;
    }
    g.questions.forEach(q => {
      qIndex++;
      const correctIdx = getCorrectIndex(q);
      if (correctIdx === -1) console.warn(`[题库错误] ${q.id} 没有 correct 标记`);
      const num = String(qIndex).padStart(2, '0');
      const optsHTML = q.options.map((opt, i) => {
        const letter = ['A', 'B', 'C', 'D'][i];
        return `<button class="option" data-idx="${i}"><span class="opt-letter">${letter}</span><span class="opt-text">${opt.text}</span></button>`;
      }).join('');
      html += `
        <div class="question" data-qid="${q.id}" data-correct="${correctIdx}">
          <div class="q-header">
            <div class="q-num">Q.${num}</div>
            <div class="q-text">${q.q}</div>
          </div>
          <div class="options">${optsHTML}</div>
          <div class="explanation">
            <div class="exp-label">解析</div>
            <div class="exp-content">${q.explain}</div>
          </div>
        </div>
      `;
    });
  });

  root.innerHTML = html;

  document.querySelectorAll('.question').forEach(qEl => {
    const correctIdx = parseInt(qEl.dataset.correct);
    const qid = qEl.dataset.qid;
    const options = qEl.querySelectorAll('.option');
    const explanation = qEl.querySelector('.explanation');
    options.forEach(btn => {
      btn.addEventListener('click', () => {
        if (qEl.classList.contains('answered')) return;
        const picked = parseInt(btn.dataset.idx);
        const isRight = picked === correctIdx;
        options.forEach((b, i) => {
          b.disabled = true;
          if (i === correctIdx) b.classList.add('correct');
          else if (i === picked && !isRight) b.classList.add('wrong');
          else b.classList.add('faded');
        });
        if (isRight) {
          qEl.dataset.result = 'correct';
          if (isMistakesMode) removeMistake(qid);
        } else {
          qEl.dataset.result = 'wrong';
          explanation.classList.add('wrong-style');
          saveMistake(qid);
        }
        qEl.classList.add('answered');
        explanation.classList.add('show');
        updateScore(questions.length);
      });
    });
  });

  document.getElementById('retry-btn').addEventListener('click', () => {
    if (isMistakesMode) {
      render();
    } else {
      renderQuestions(questions, moduleId, isMistakesMode);
      updateScore(questions.length);
      document.getElementById('final-card').classList.remove('show');
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }
  });
}

function updateScore(total) {
  const allQs = document.querySelectorAll('.question');
  let answered = 0, correct = 0, wrong = 0;
  allQs.forEach(q => {
    if (q.classList.contains('answered')) {
      answered++;
      if (q.dataset.result === 'correct') correct++;
      else wrong++;
    }
  });
  document.getElementById('answered').textContent = answered;
  document.getElementById('correct').textContent = correct;
  document.getElementById('wrong').textContent = wrong;
  document.getElementById('accuracy').textContent = answered === 0 ? '—' : Math.round(correct / answered * 100) + '%';
  const pct = Math.round(answered / total * 100);
  document.getElementById('pct').textContent = pct;
  document.getElementById('progress-fill').style.right = (100 - pct) + '%';
  if (answered === total) showFinalCard(correct, total);
}

function showFinalCard(correct, total) {
  const pct = correct / total;
  document.getElementById('final-correct').textContent = correct;
  let grade, text;
  if (pct >= 0.9) {
    grade = '★ ★ ★ ★ ★ · 专家级';
    text = '几乎全对——这个模块你已经吃透了。可以挑战别的模块，或者去综合测试里检验整体水平。';
  } else if (pct >= 0.75) {
    grade = '★ ★ ★ ★ · 进阶级';
    text = '大部分都答对了，掌握得不错。错题已自动加入错题本，回去刷一遍把盲点补上。';
  } else if (pct >= 0.6) {
    grade = '★ ★ ★ · 入门级';
    text = '基础概念有了，但还有不少细节没吃透。建议把错题本过一遍，对应回前面聊过的内容再梳理一次。';
  } else {
    grade = '★ ★ · 起步阶段';
    text = '别气馁——这些题包含了不少操作细节和坑，第一次接触全答对几乎不可能。<em>错题本里的题反复刷，看一次记不住很正常。</em>';
  }
  document.getElementById('final-grade').textContent = grade;
  document.getElementById('final-text').innerHTML = text;
  if (getMistakes().length === 0) {
    document.getElementById('mistakes-link').style.display = 'none';
  }
  document.getElementById('final-card').classList.add('show');
  setTimeout(() => {
    document.getElementById('final-card').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }, 300);
}

/* ════════════════════════════════════════
   页面：Mistakes / 错题本
   ════════════════════════════════════════ */
function renderMistakes(app) {
  const ids = getMistakes();
  const questions = getQuestionsByIds(ids);

  document.title = '错题本 · 广告投放知识测验';

  let distHTML = '';
  if (questions.length > 0) {
    const dist = {};
    questions.forEach(q => { dist[q.module] = (dist[q.module] || 0) + 1; });
    distHTML = Object.entries(dist).map(([m, c]) => `${m} <strong>${c}</strong>`).join(' · ');
  }

  app.innerHTML = `
    <div class="container">
      <div class="masthead">
        <div class="masthead-left">Vol. 04 · 错题本</div>
        <div class="masthead-right"><a href="#/">← 返回选择模块</a></div>
      </div>

      <div class="title-block">
        <div class="kicker">— Mistakes Journal —</div>
        <h1>错题本<br><em>逐个攻破</em></h1>
        <p class="dek">这里收集了你答错过的题目。点击"开始练习"逐一过关——答对的题会自动从错题本移除，答错的继续保留。直到清空为止。</p>
        <div class="meta-row">
          <span>共 <strong>${questions.length}</strong> 道错题</span>
          <span>${distHTML}</span>
        </div>
      </div>

      ${questions.length === 0 ? `
        <div class="empty-state">
          <div class="icon">✓</div>
          <div class="title">错题本是空的</div>
          <div class="text">说明你的水平已经超过当前题库了——或者还没开始练习。先去做几轮测试吧，答错的题会自动出现在这里。</div>
          <a class="btn btn-primary" href="#/">回到首页</a>
        </div>
      ` : `
        <div class="mistakes-toolbar">
          <div class="mistakes-toolbar-info">有 <strong>${questions.length}</strong> 道题等你攻破</div>
          <div class="mistakes-toolbar-actions">
            <a class="toolbar-btn primary" href="#/quiz?mode=mistakes">▶ 开始练习</a>
            <button class="toolbar-btn danger" id="clear-btn">⌫ 全部清空</button>
          </div>
        </div>
        ${questions.map((q, idx) => `
          <div class="mistake-preview">
            <div class="mistake-header">
              <div class="mistake-tag">
                <span>Q.${String(idx+1).padStart(2,'0')}</span>
                <span class="module-tag">${q.module}</span>
                ${q.section ? `<span>${q.section}</span>` : ''}
              </div>
              <button class="mistake-remove" data-id="${q.id}">✗ 移除</button>
            </div>
            <div class="mistake-q">${q.q}</div>
          </div>
        `).join('')}
      `}

      <div class="colophon">✦ 反复练 · 直到清空 ✦</div>
    </div>
  `;

  if (questions.length > 0) {
    document.getElementById('clear-btn').addEventListener('click', () => {
      if (confirm(`确定要清空全部 ${questions.length} 道错题吗？此操作不可恢复。`)) {
        clearMistakes();
        render();
      }
    });
    document.querySelectorAll('.mistake-remove').forEach(btn => {
      btn.addEventListener('click', () => {
        removeMistake(btn.dataset.id);
        render();
      });
    });
  }
}
</script>
